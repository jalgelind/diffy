# Example "inverted" theme: a fully background-filled, dark color scheme.
#
# Unlike the default (foreground-only) theme, every cell sets a background, so
# the side-by-side view renders as solid colored blocks — deleted lines on a
# dark red field, inserted lines on a dark green field, everything else on a
# neutral dark background. Changed tokens set only a foreground, so their
# highlight layers on top of the line's background instead of clearing it.
#
# To use it: copy this file to your diffy config directory as
# `theme_inverted.conf` and set `theme = 'theme_inverted'` in `diffy.conf`.
# (Run `diffy --help` to see the config directory path.)

[settings]
word_wrap = true
show_line_numbers = true
context_colored_line_numbers = true
line_number_align_right = false

[chars]
column_separator = ' │'
edge_separator = ''
tab_replacement = '→   '
cr_replacement = '←'
lf_replacement = '↓'
crlf_replacement = '↵'
space_replacement = '·'

[style]
# Base background painted under every cell. Any cell that does not set its own
# `bg` inherits this, so a single key is enough to avoid terminal-default gaps.
background = { fg = 'none', bg = '#1c1c1c', attr = [] }

header = { fg = 'white', bg = '#264f78', attr = ['bold'] }

delete_line = { fg = 'none', bg = '#3b1212', attr = [] }
delete_token = { fg = '#ff8080', bg = 'none', attr = ['bold'] }
delete_line_number = { fg = '#ff8080', bg = '#3b1212', attr = [] }

insert_line = { fg = 'none', bg = '#0f2d0f', attr = [] }
insert_token = { fg = '#80ff80', bg = 'none', attr = ['bold'] }
insert_line_number = { fg = '#80ff80', bg = '#0f2d0f', attr = [] }

common_line = { fg = 'light_gray', bg = '#1c1c1c', attr = [] }
common_line_number = { fg = 'dark_gray', bg = '#1c1c1c', attr = [] }

frame = { fg = 'dark_gray', bg = '#1c1c1c', attr = [] }
empty_cell = { fg = 'none', bg = '#1c1c1c', attr = [] }
