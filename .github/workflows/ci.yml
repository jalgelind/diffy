name: CI

# Run on every push and on pull requests targeting any branch.
on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # core: builds the CLI + tests, runs ctest and the python integration suite
  # via extras/ci.sh on Linux and macOS.
  # ---------------------------------------------------------------------------
  core:
    name: core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      # extras/ci.sh honours BUILD_DIR; keep it stable for caching/debugging.
      # All build trees live under out/ (the project-wide convention).
      BUILD_DIR: out/ci
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          # tree-sitter grammars, doctest and config_parser are git submodules.
          submodules: recursive

      # Ninja is needed by extras/ci.sh; python3 is preinstalled on both runners.
      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Build + test (CLI + tests + integration)
        run: bash extras/ci.sh
